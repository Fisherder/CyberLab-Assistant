apiVersion: cla.edu/v1
kind: CyberChallenge
metadata:
  id: web-sqli-auth-001
  version: 1.3.0
  title: 登录逻辑与输入信任边界
  license: internal-course
spec:
  category: WEB
  modality: REAL_LAB
  workspace:
    type: TERMINAL
    image: cla/workspace-web:dev
    shell: /bin/bash
    user: student
    capabilities:
      - curl
      - python
      - sqlmap-disabled
    fileTransfer: CONTROLLED
  studentAccess:
    kind: WEB_HTTP
    label: 目标网站
    entryPath: /
    actionLabel: 在浏览器中打开目标网站
    description: 这是 Web 登录认证实践题。获取容器后，目标网站会显示可交互的登录调试页面，学生可以先用浏览器观察页面行为，再回到终端构造请求。
    guidance: 建议先打开目标网站进行初步探索，再在终端中使用 curl 复现登录请求、观察状态码和响应内容。
    commands:
      - curl -i "$TARGET_BASE_URL/"
      - curl -i "$TARGET_BASE_URL/healthz"
      - curl -i -X POST "$TARGET_BASE_URL/login" -d "username=alice&password=wrong"
  learningObjectives:
    - identify-input-trust-boundary
    - validate-authentication-impact
    - explain-parameterized-query
  difficulty: 2
  expectedMinutes: 75
  prerequisites:
    - http-basics
    - sql-basics
  runtime:
    isolationTier: 1
    cpu: "500m"
    memory: "768Mi"
    ephemeralStorage: "1Gi"
    ttlMinutes: 90
    maxResets: 2
    egressPolicy: DENY_ALL
  topologyRef: topology.yaml
  randomization:
    seedScope: PER_ATTEMPT
    secretProvider: PLATFORM_INJECTED
  successOracle:
    type: EXTERNAL_HTTP_PREDICATE
    validatorRef: oracle/validator.py
    timeoutSeconds: 10
  milestonesRef: milestones.yaml
  tutorPolicy:
    maxHintLevel: 3
    autoHint: true
    cooldownTurns: 3
    forbiddenDisclosures:
      - final_payload
      - dynamic_secret
      - teacher_solution
  rubricRef: rubric.yaml
  retentionPolicyRef: policy/retention.yaml
  futureCapabilities:
    remoteDesktop: false
    simulatedWorkspace: false
