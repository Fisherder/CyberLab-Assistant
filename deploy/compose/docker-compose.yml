services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cla
      POSTGRES_PASSWORD: cla
      POSTGRES_DB: cla
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cla-local
      MINIO_ROOT_PASSWORD: cla-local-password
    ports:
      - "9000:9000"
      - "9001:9001"
  api:
    build:
      context: ../../services/api
    environment:
      CLA_DATABASE_URL: postgresql+psycopg://cla:cla@postgres:5432/cla
      CLA_GATEWAY_URL: ws://localhost:8081/ws/terminal
      CLA_SESSIOND_ENDPOINT: sessiond:7777
      CLA_TRANSCRIPT_STORAGE_BACKEND: local
      CLA_TRANSCRIPT_OBJECT_ROOT: /tmp/cla-transcript-objects
      CLA_TRANSCRIPT_S3_BUCKET: cla-transcript-raw
      CLA_TRANSCRIPT_S3_PREFIX: terminal-transcripts
      CLA_TRANSCRIPT_S3_ENDPOINT_URL: http://minio:9000
      CLA_TRANSCRIPT_S3_REGION: us-east-1
      CLA_TRANSCRIPT_S3_FORCE_PATH_STYLE: "true"
      CLA_TRANSCRIPT_ENCRYPTION_KEY: change-me-compose-transcript-key
      CLA_INTERNAL_SERVICE_TOKEN: change-me-internal
      CLA_REMOTE_DESKTOP_ENABLED: "false"
      CLA_SIMULATED_WORKSPACE_ENABLED: "false"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
  terminal-gateway:
    build:
      context: ../..
      dockerfile: services/terminal-gateway/Dockerfile
    environment:
      CLA_API_URL: http://api:8000
      CLA_INTERNAL_SERVICE_TOKEN: change-me-internal
      CLA_GATEWAY_ADDR: :8081
      CLA_REDIS_ADDR: redis:6379
      CLA_RECORDING_QUEUE_SIZE: "1024"
    depends_on:
      - api
      - redis
    ports:
      - "8081:8081"
  sessiond:
    build:
      context: ../..
      dockerfile: runtime/sessiond/Dockerfile
    environment:
      CLA_SESSIOND_ADDR: 0.0.0.0:7777
      CLA_WORKSPACE_SHELL: /bin/bash
      CLA_WORKSPACE_DIR: /workspace
    expose:
      - "7777"
  target:
    build:
      context: ../../content/challenges/web-sqli-auth/target
    environment:
      TARGET_SESSION_KEY: dev-session-key
    ports:
      - "18080:8080"
