version: "3"

vars:
  PY: .venv/bin/python

tasks:
  test:
    desc: 运行当前切片的 API 自动化测试。
    cmds:
      - "{{.PY}} -m pytest services/api/tests"

  test:go:
    desc: 运行终端网关、环境控制器和 sessiond 的 Go 测试。
    env:
      GOCACHE: /tmp/cla-go-cache
    cmds:
      - "go test ./packages/sessionwire/... ./services/terminal-gateway/... ./services/environment-controller/... ./runtime/sessiond/..."

  api:dev:
    desc: 以本地 SQLite 模式启动 FastAPI 控制平面。
    env:
      PYTHONPATH: services/api/src
      CLA_DATABASE_URL: sqlite:///./cla-dev.db
      CLA_DEV_MODE: "true"
    cmds:
      - ".venv/bin/uvicorn cla.main:app --reload --app-dir services/api/src"

  tokens:dev:
    desc: 输出种子教师和学生账号的开发 OIDC token。
    env:
      PYTHONPATH: services/api/src
    cmds:
      - "{{.PY}} -m cla.dev_tokens"

  db:migrate:
    desc: 执行 Alembic 数据库迁移。
    cmds:
      - "cd services/api && ../../.venv/bin/python -m alembic upgrade head"

  e2e:terminal:
    desc: 运行本地终端纵向切片 API 测试。
    cmds:
      - "{{.PY}} -m pytest services/api/tests/test_terminal_vertical_slice.py"

  content:validate:
    desc: 运行确定性 Challenge-as-Code 验证并重新生成教师报告。
    env:
      PYTHONPATH: services/api/src
    cmds:
      - "{{.PY}} -m cla.content_validation --output content/validation/web-sqli-auth-001-1.3.0.validation.json"
